name: PHP CI Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  INFINITYFREE_USERNAME: if0_42178397
  DB_HOST: sql107.infinityfree.com
  DB_NAME: if0_42178397_dashboard_tvg
  DB_USER: if0_42178397
  APP_URL: https://dashboard-tvg.kesug.com
  API_BASE_URL: /api

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - name: Validate PHP Syntax
        run: |
          find . -type f -name "*.php" -exec php -l {} \;

      - name: Show PHP Version
        run: php -v

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Source
        uses: actions/checkout@v5

      - name: Check secrets
        run: |
          if [ -z "${{ secrets.INFINITYFREE_PASSWORD }}" ]; then echo "Missing INFINITYFREE_PASSWORD"; exit 1; fi
          if [ -z "${{ secrets.DB_PASS }}" ]; then echo "Missing DB_PASS"; exit 1; fi
          if [ -z "${{ secrets.JWT_SECRET }}" ]; then echo "Missing JWT_SECRET"; exit 1; fi

      - name: Create production env
        run: |
          cat > .env <<'ENV'
          DB_HOST=${{ env.DB_HOST }}
          DB_NAME=${{ env.DB_NAME }}
          DB_USER=${{ env.DB_USER }}
          DB_PASS=${{ secrets.DB_PASS }}

          APP_URL=${{ env.APP_URL }}
          API_BASE_URL=${{ env.API_BASE_URL }}

          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRE=3600

          INFINITYFREE_USERNAME=${{ env.INFINITYFREE_USERNAME }}
          ENV

      - name: FTP Deploy to InfinityFree
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftpupload.net
          username: ${{ env.INFINITYFREE_USERNAME }}
          password: ${{ secrets.INFINITYFREE_PASSWORD }}
          local-dir: ./
          server-dir: /htdocs/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.env.example
            **/node_modules/**
            **/resources/**
            **/package.json
            **/package-lock.json
            **/database/**
