name: PHP CI Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - name: Validate PHP Syntax
        run: |
          find . -type f -name "*.php" -exec php -l {} \;

      - name: Show PHP Version
        run: php -v

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Create production config
        run: |
          cat > config/config.php <<'PHP'
          <?php
          define('DB_HOST', '${{ secrets.DB_HOST }}');
          define('DB_NAME', '${{ secrets.DB_NAME }}');
          define('DB_USER', '${{ secrets.DB_USER }}');
          define('DB_PASS', '${{ secrets.DB_PASS }}');

          define('JWT_SECRET', '${{ secrets.JWT_SECRET }}');
          define('JWT_EXPIRE', 3600);
          PHP

      - name: FTP Deploy to InfinityFree
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftpupload.net
          username: ${{ secrets.INFINITYFREE_USERNAME }}
          password: ${{ secrets.INFINITYFREE_PASSWORD }}
          local-dir: ./
          server-dir: /htdocs/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/resources/**
            **/package.json
            **/package-lock.json
            **/database/**
