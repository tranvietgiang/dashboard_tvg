name: PHP CI

on:
  push:
    branches:
      - main
      - init-project
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - name: Validate PHP Syntax
        run: |
          find . -type f -name "*.php" -exec php -l {} \;

      - name: Show PHP Version
        run: php -v
